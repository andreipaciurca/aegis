<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://andreipaciurca.github.io/aegis/404.html">
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<title>aegis - page not found</title>
<script>
  (function () {
    try {
      var t = localStorage.getItem("aegis-theme");
      if (!t) t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<style>
  :root {
    --bg: #11111b; --panel: #1e1e2e; --panel-2: #181825; --line: #45475a;
    --text: #cdd6f4; --subtle: #9399b2; --accent: #cba6f7; --green: #a6e3a1;
    --mono: ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      --bg: #e6e9ef; --panel: #eff1f5; --panel-2: #dce0e8; --line: #bcc0cc;
      --text: #4c4f69; --subtle: #6c6f85; --accent: #8839ef; --green: #40a02b;
    }
  }
  :root[data-theme="light"] {
    --bg: #e6e9ef; --panel: #eff1f5; --panel-2: #dce0e8; --line: #bcc0cc;
    --text: #4c4f69; --subtle: #6c6f85; --accent: #8839ef; --green: #40a02b;
  }
  :root[data-theme="dark"] {
    --bg: #11111b; --panel: #1e1e2e; --panel-2: #181825; --line: #45475a;
    --text: #cdd6f4; --subtle: #9399b2; --accent: #cba6f7; --green: #a6e3a1;
  }
  * { box-sizing: border-box; }
  body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: var(--bg); color: var(--text); font-family: var(--mono); transition: background .25s ease, color .25s ease; }
  main { width: min(720px, calc(100vw - 32px)); border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 28px; position: relative; }
  .brand { display: inline-block; background: var(--accent); color: var(--bg); font-weight: 800; padding: 3px 10px; border-radius: 4px; }
  h1 { margin: 28px 0 12px; font-size: clamp(30px, 9vw, 76px); line-height: 1; }
  p { color: var(--subtle); line-height: 1.7; max-width: 58ch; }
  code { color: var(--green); background: var(--panel-2); padding: 1px 5px; border-radius: 3px; }
  a { color: var(--accent); }
  .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
  .btn { border: 1px solid var(--line); border-radius: 6px; padding: 9px 12px; text-decoration: none; color: var(--text); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .theme-toggle {
    position: absolute; top: 16px; right: 16px; background: var(--panel-2); color: var(--subtle);
    border: 1px solid var(--line); border-radius: 6px; cursor: pointer;
    width: 30px; height: 30px; font-size: 14px; font-family: var(--mono);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .theme-toggle .moon { display: none; }
  :root[data-theme="light"] .theme-toggle .sun { display: none; }
  :root[data-theme="light"] .theme-toggle .moon { display: inline; }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) .theme-toggle .sun { display: none; }
    :root:not([data-theme]) .theme-toggle .moon { display: inline; }
  }
</style>
<script src="analytics.js" defer></script>
</head>
<body>
<main>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark theme" title="Toggle theme">
    <span class="sun">☀</span><span class="moon">☾</span>
  </button>
  <span class="brand">AEGIS</span>
  <h1>404</h1>
  <p><code>route not found</code>. The scanner checked this path and came back empty.
  Head back to the dashboard or inspect the source.</p>
  <div class="actions">
    <a class="btn primary" href="./index.html">back to aegis</a>
    <a class="btn" href="./trust.html">trust page</a>
    <a class="btn" href="https://github.com/andreipaciurca/aegis">GitHub</a>
  </div>
</main>
<script>
(function () {
  var btn = document.getElementById("themeToggle");
  function current() {
    return document.documentElement.getAttribute("data-theme") ||
      (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  }
  btn.addEventListener("click", function () {
    var next = current() === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("aegis-theme", next); } catch (e) {}
  });
})();
</script>
</body>
</html>
